server {
    listen 80;
    server_name boompiai.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name boompiai.ru;

    ssl_certificate /etc/letsencrypt/live/boompiai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/boompiai.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/boompiai.ru/chain.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # gzip для статики
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Webhook от Telegram
    location /webhook {
        proxy_pass http://bot:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Telegram присылает секретный токен в этом заголовке — пробрасываем
        proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;

        # Telegram держит соединение до 60 сек, но aiogram отвечает мгновенно
        # благодаря handle_in_background=True. Делаем буфер чуть больше на всякий.
        proxy_connect_timeout 30s;
        proxy_send_timeout    65s;
        proxy_read_timeout    65s;

        client_max_body_size 25M;
    }

    location /health {
        proxy_pass http://bot:8080;
        proxy_set_header Host $host;
        access_log off;
    }

    location /output/ {
        alias /usr/share/nginx/html/output/;
        autoindex on;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
