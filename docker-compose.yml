services:
  bot:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - .:/app
      - bot-documents:/app/documents
      - bot-code-files:/app/code_files
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./output:/usr/share/nginx/html/output
      - ./media:/usr/share/nginx/html/media
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - bot
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./output:/usr/share/nginx/html/output
    command: certonly --webroot --webroot-path=/usr/share/nginx/html/output --email korjafar@gmail.com --agree-tos --no-eff-email -d boompiai.ru
    depends_on:
      - nginx

volumes:
  certbot-etc:
  certbot-var:
  redis-data:
  bot-documents:
  bot-code-files:
